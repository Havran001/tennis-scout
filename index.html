<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tennis Scout</title>
<style>*{margin:0;padding:0;}body{background:#0d1117;}</style>
</head>
<body>
<script>
(async function(){
  var r=await fetch('https://raw.githubusercontent.com/Havran001/tennis-scout/main/tennis_scout_live.js?v='+Date.now()+'&r='+Math.random().toString(36).slice(2)+Date.now(),{cache:'no-store'});
  var code=await r.text();
  eval(code);
})();
</script>

<div id="ts-progress" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid rgba(0,200,83,0.4);padding:10px 20px;font-size:12px;color:#e6edf3;z-index:99999;text-align:center;"></div>
<script>
// Sleduj window._tsProgress a zobrazuj progress bar
setInterval(function(){
  var bar = document.getElementById('ts-progress');
  if(!bar) return;
  var txt = window._tsProgress || '';
  if(txt) { bar.style.display='block'; bar.textContent=txt; }
  else bar.style.display='none';
}, 300);
</script>
</body>
</html>
