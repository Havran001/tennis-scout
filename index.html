<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Tennis Scout</title>
<style>*{margin:0;padding:0;}body{background:#0d1117;}</style>
</head>
<body>
<script>
(async function(){
  var code;
  try {
    // Primárně raw GitHub s cache bust — vždy čerstvý kód
    var r=await fetch('https://raw.githubusercontent.com/Havran001/tennis-scout/main/tennis_scout_live.js?_='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error('raw failed: '+r.status);
    code=await r.text();
  } catch(e) {
    // Fallback přes GitHub API s tokenem
    try {
      var gh=localStorage.getItem('ts_gh_token')||'';
      var headers=gh?{'Authorization':'token '+gh}:{};
      var r2=await fetch('https://api.github.com/repos/Havran001/tennis-scout/contents/tennis_scout_live.js?_='+Date.now(),{headers:headers,cache:'no-store'});
      var d=await r2.json();
      if(!d.content) throw new Error('no content');
      var binary=atob(d.content.replace(/\n/g,''));
      var bytes=new Uint8Array(binary.length);
      for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
      code=new TextDecoder('utf-8').decode(bytes);
    } catch(e2) { console.error('Both fetch methods failed',e2); return; }
  }
  eval(code);
})();
</script>
</body>
</html>
