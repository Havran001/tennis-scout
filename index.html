<script>(function p(){var sh=document.getElementById("ts-host")&&document.getElementById("ts-host").shadowRoot;if(!sh){setTimeout(p,300);return;}if(sh.__acStyle)return;var st=document.createElement("style");st.textContent='.ts-ac-wrap{position:relative;display:inline-block;width:100%;}.ts-ac-list{position:absolute;top:100%;left:0;right:0;z-index:9999;background:#1a2332;border:1px solid #2a3f5a;border-radius:6px;max-height:280px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.5);margin-top:2px;display:none;}.ts-ac-list.show{display:block;}.ts-ac-item{padding:8px 12px;cursor:pointer;color:#e0e0e0;font-size:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a3f5a;}.ts-ac-item:last-child{border-bottom:none;}.ts-ac-item:hover,.ts-ac-item.active{background:#2a3f5a;}.ts-ac-name{flex:1;}.ts-ac-rank{color:#7ed957;font-size:12px;margin-right:8px;}.ts-ac-country{color:#8ba4c0;font-size:12px;}';sh.appendChild(st);sh.__acStyle=true;function fold(s){return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();}function setup(input){if(input.__acInstalled)return;input.__acInstalled=true;input.setAttribute("autocomplete","off");var parent=input.parentNode;var wrap=document.createElement("div");wrap.className="ts-ac-wrap";parent.insertBefore(wrap,input);wrap.appendChild(input);var list=document.createElement("div");list.className="ts-ac-list";wrap.appendChild(list);var activeIdx=-1,curr=[];function flt(q){if(!q||q.length<1)return [];var qf=fold(q);var pl=window.ATP_PLAYERS||[];var res=[];for(var i=0;i<pl.length;i++){var p=pl[i];var nf=fold(p.full_name||p.name);if(nf.split(/[\s.\-]+/).some(function(w){return w.indexOf(qf)===0;})){res.push(p);if(res.length>=10)break;}}if(res.length===0){for(var i=0;i<pl.length;i++){var p=pl[i];if(fold(p.full_name||p.name).indexOf(qf)>=0){res.push(p);if(res.length>=10)break;}}}return res;}function render(){list.innerHTML="";curr.forEach(function(p,i){var it=document.createElement("div");it.cl <script>(function(){function run(){var sh=document.getElementById("ts-host")&&document.getElementById("ts-host").shadowRoot;if(!sh)return;var p1=sh.getElementById("h2h-p1"),p2=sh.getElementById("h2h-p2");if(!p1||!p2)return;var n1=(p1.value||"").split(/\s+/).pop(),n2=(p2.value||"").split(/\s+/).pop();if(!n1||!n2)return;var cIds=Object.keys(window.__oddsCache||{});if(cIds.length<2)return;function flip(s){return s.split(" ").map(function(x){if(/^RET|^W\.?O|^DEF/i.test(x))return x;var m=x.match(/^(\d+)-(\d+)(\([^)]+\))?(.*)$/);if(!m)return x;return m[2]+"-"+m[1]+(m[3]||"")+(m[4]||"");}).join(" ");}function dIso(d){var m=d.match(/^(\d+)\.(\d+)$/);if(!m)return null;return "2026-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");}function findEntry(pid,date,opp){var pc=window.__oddsCache&&window.__oddsCache[pid];if(!pc)return null;var ol=opp.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");for(var k in pc){var pr=k.split("|");if(pr[0]!==date)continue;if(pr[1].toLowerCase().indexOf(ol)===0||ol.indexOf(pr[1].toLowerCase())===0)return pc[k];}return null;}var secs=[];var w=document.createTreeWalker(sh,NodeFilter.SHOW_TEXT);var n;while(n=w.nextNode()){if(n.nodeValue&&n.nodeValue.indexOf("POSLEDNÍCH 10")>=0){var m=n.nodeValue.trim().match(/^([A-ZÀ-ÿ]+)/i);secs.push({name:m?m[1]:"",parent:n.parentElement.parentElement});}}secs.forEach(function(sec){var ln,pid;var samples=[];for(var rr=1;rr<sec.parent.children.length&&samples.length<3;rr++){var rrow=sec.parent.children[rr];if(rrow.children.length<8)continue;var rdt=rrow.children[0].textContent.trim();var rop=rrow.children[3].textContent.trim();var rparts=rop.split(/\s+vs\s+/);var ropName=rparts.length===2?rparts[1]:rop;ropName=ropName.replace(/^\d+(\.\d+)?\s+/,"").trim();var riso=dIso(rdt);if(riso&&ropName)samples.push({date:riso,opp:ropName.toLowerCase()});}var scores=cIds.map(function(pp){var pc=window.__oddsCache[pp];var s=0;samples.forEach(function(sa){for(var kk2 in pc){var prr=kk2.split("|");if(prr[0]===sa.date&&pr
