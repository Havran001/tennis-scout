<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tennis Scout</title>
<style>*{margin:0;padding:0;}body{background:#0d1117;}
.fs-btn {
  flex-shrink: 0;
  margin: 0 8px;
  width: 28px;
  height: 28px;
  border-radius: 7px;
  display: block;
  text-decoration: none;
  background-color: #0c1929;
  background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'><circle cx='13' cy='15' r='7' fill='none' stroke='white' stroke-width='2' stroke-dasharray='4 2'/><circle cx='13' cy='15' r='3' fill='white'/><polygon points='16,3 24,12 19,12 22,25 11,13 17,13' fill='%23e8193c'/></svg>");
  background-size: 100%;
  background-repeat: no-repeat;
  transition: opacity 0.15s;
}
.fs-btn:hover { opacity: 0.75; }</style>
</head>
<body>
<script>
(async function(){
  var r=await fetch('https://raw.githubusercontent.com/Havran001/tennis-scout/main/tennis_scout_live.js?t='+Date.now(),{cache:'no-store'});
  var code=await r.text();
  eval(code);
  // Po načtení automaticky otevři záložku Zápasy
  setTimeout(function(){
    var sh=document.getElementById('ts-host')&&document.getElementById('ts-host').shadowRoot;
    if(sh){
      var btn=sh.getElementById('nav-matches');
      if(btn)btn.click();
    }
  },1500);
})();
</script>
</body>
</html>
