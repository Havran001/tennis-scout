<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tennis Scout</title>
<style>*{margin:0;padding:0;}body{background:#0d1117;}</style>
</head>
<body>
<script>
(async function(){
  var code;
  try {
    // Primárně přes GitHub API s tokenem - vždy aktuální verze
    var gh=localStorage.getItem('ts_gh_token')||'';
    var headers=gh?{'Authorization':'token '+gh}:{};
    var r=await fetch('https://api.github.com/repos/Havran001/tennis-scout/contents/tennis_scout_live.js?_='+Date.now(),{headers:headers,cache:'no-store'});
    var d=await r.json();
    if(!d.content) throw new Error('no content');
    var binary=atob(d.content.replace(/\n/g,''));
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    code=new TextDecoder('utf-8').decode(bytes);
  } catch(e) {
    // Fallback přes raw
    var r2=await fetch('https://raw.githubusercontent.com/Havran001/tennis-scout/main/tennis_scout_live.js?nocache='+Date.now()+'&r='+Math.random(),{cache:'no-store'});
    code=await r2.text();
  }
  eval(code);
})();
</script>
</body>
</html>
