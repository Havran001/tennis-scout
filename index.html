<body>
<script>

  .then(function(r){return r.text();})

<script>(function p(){var sh=document.getElementById('ts-host')&&document.getElementById('ts-host').shadowRoot;if(!sh){setTimeout(p,300);return;}if(sh.__acStyle)return;var st=document.createElement('style');st.textContent='.ts-ac-wrap{position:relative;display:inline-block;width:100%;}.ts-ac-list{position:absolute;top:100%;left:0;right:0;z-index:9999;background:#1a2332;border:1px solid #2a3f5a;border-radius:6px;max-height:280px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.5);margin-top:2px;display:none;}.ts-ac-list.show{display:block;}.ts-ac-item{padding:8px 12px;cursor:pointer;color:#e0e0e0;font-size:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a3f5a;}.ts-ac-item:last-child{border-bottom:none;}.ts-ac-item:hover,.ts-ac-item.active{background:#2a3f5a;}.ts-ac-name{flex:1;}.ts-ac-rank{color:#7ed957;font-size:12px;margin-right:8px;}.ts-ac-country{color:#8ba4c0;font-size:12px;}';sh.appendChild(st);sh.__acStyle=true;function fold(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();}function setup(input){if(input.__acInstalled)return;input.__acInstalled=true;input.setAttribute('autocomplete','off');var parent=input.parentNode;var wrap=document.createElement('div');wrap.className='ts-ac-wrap';parent.insertBefore(wrap,input);wrap.appendChild(input);var list=document.createElement('div');list.className='ts-ac-list';wrap.appendChild(list);var activeIdx=-1,curr=[];function flt(q){if(!q||q.length<1)return [];var qf=fold(q);var pl=window.ATP_PLAYERS||[];var res=[];for(var i=0;i<pl.length;i++){var p=pl[i];var nf=fold(p.full_name||p.name);if(nf.split(/[\s.\-]+/).some(function(w){return w.indexOf(qf)===0;})){res.push(p);if(res.length>=10)break;}}if(res.length===0){for(var i=0;i<pl.length;i++){var p=pl[i];if(fold(p.full_name||p.name).indexOf(qf)>=0){res.push(p);if(res.length>=10)break;}}}return res;}function render(){list.innerHTML='';curr.forEach(function(p,i){var it=document.createElement('div');it.className='ts-ac-item'+(i===activeIdx?' active':'');it.innerHTML='<span class="ts-ac-rank">#'+(p.rank||'?')+'</span><span class="ts-ac-name">'+(p.full_name||p.name)+'</span><span class="ts-ac-country">'+(p.country||'')+'</span>';it.addEventListener('mousedown',function(e){e.preventDefault();input.value=p.full_name||p.name;list.classList.remove('show');});list.appendChild(it);});list.classList.toggle('show',curr.length>0);}input.addEventListener('input',function(){curr=flt(input.value);activeIdx=-1;render();});input.addEventListener('keydown',function(e){if(!list.classList.contains('show'))return;if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,curr.length-1);render();}else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);render();}else if(e.key==='Enter'&&activeIdx>=0){e.preventDefault();input.value=curr[activeIdx].full_name||curr[activeIdx].name;list.classList.remove('show');}else if(e.key==='Escape'){list.classList.remove('show');}});input.addEventListener('blur',function(){setTimeout(function(){list.classList.remove('show');},200);});input.addEventListener('focus',function(){if(input.value&&curr.length>0)list.classList.add('show');});}setInterval(function(){var p1=sh.getElementById('h2h-p1'),p2=sh.getElementById('h2h-p2');if(p1)setup(p1);if(p2)setup(p2);},500);})();</script></body>
