<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tennis Scout</title>
<style>*{margin:0;padding:0;}body{background:#0d1117;}</style>
</head>
<body>
<script>
(async function(){
  // Načti přes GitHub API - vždy aktuální, ignoruje CDN cache
  var api='https://api.github.com/repos/Havran001/tennis-scout/contents/tennis_scout_live.js';
  var r=await fetch(api,{cache:'no-store'});
  var d=await r.json();
  var binary=atob(d.content.replace(/\n/g,''));
  var bytes=new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  var code=new TextDecoder('utf-8').decode(bytes);
  eval(code);
})();
</script>

<div id="ts-progress" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid rgba(0,200,83,0.4);padding:10px 20px;font-size:12px;color:#e6edf3;z-index:99999;text-align:center;"></div>
<script>
// Sleduj window._tsProgress a zobrazuj progress bar
setInterval(function(){
  var bar = document.getElementById('ts-progress');
  if(!bar) return;
  var txt = window._tsProgress || '';
  if(txt) { bar.style.display='block'; bar.textContent=txt; }
  else bar.style.display='none';
}, 300);
</script>
</body>
</html>
