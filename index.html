<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tennis Scout</title>
<style>*{margin:0;padding:0;}body{background:#0d1117;}</style>
</head>
<body>
<script>
(async function(){
  var r=await fetch('https://api.github.com/repos/Havran001/tennis-scout/contents/tennis_scout_live.js',{cache:'no-store'});
  var d=await r.json();
  var bytes=Uint8Array.from(atob(d.content.replace(/\n/g,'')),function(c){return c.charCodeAt(0);});
  var code=new TextDecoder('utf-8').decode(bytes);
  eval(code);
})();
</script>
</body>
</html>
