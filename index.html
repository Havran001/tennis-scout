<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Tennis Scout</title>
<style>*{margin:0;padding:0;}body{background:#0d1117;}</style>
</head>
<body>
<script>
var s = document.createElement('script');
s.src = 'https://raw.githubusercontent.com/Havran001/tennis-scout/main/tennis_scout_live.js?_=' + Date.now();
s.onerror = function() {
  var gh = localStorage.getItem('ts_gh_token') || '';
  var headers = gh ? {'Authorization': 'token ' + gh} : {};
  fetch('https://api.github.com/repos/Havran001/tennis-scout/contents/tennis_scout_live.js', {headers: headers, cache: 'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d.content) return;
      var binary = atob(d.content.replace(/\n/g,''));
      var bytes = new Uint8Array(binary.length);
      for(var i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
      var code = new TextDecoder('utf-8').decode(bytes);
      var s2 = document.createElement('script');
      s2.textContent = code;
      document.head.appendChild(s2);
    }).catch(function(e){ console.error('Fallback failed', e); });
};
document.head.appendChild(s);
</script>
</body>
</html>
