<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tennis Scout 🎾</title>
<style>body{margin:0;background:#0a0c0f;display:flex;align-items:center;justify-content:center;height:100vh;font-family:"DM Sans","Segoe UI",sans-serif;color:#e8eaf0;}.spin{width:48px;height:48px;border:4px solid #1e2330;border-top-color:#c8f135;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}@keyframes spin{to{transform:rotate(360deg);}}h1{font-family:Georgia,serif;font-size:28px;color:#c8f135;letter-spacing:3px;margin:0 0 8px;}h1 span{color:#5a6070;}p{color:#5a6070;font-size:13px;margin:0;}.t{text-align:center;}</style>
</head>
<body>
<div class="t"><div class="spin"></div><h1>Tennis<span>Scout</span></h1><p>Načítám...</p></div>
<script>
fetch('https://raw.githubusercontent.com/Hacran001/tennis-scout/main/tennis_scout_live.js')
  .then(r=>r.text()).then(code=>eval(code))
  .catch(e=>{document.body.innerHTML='<div style="color:#f13570;text-align:center;padding:40px;font-family:monospace">Chyba: '+e.message+'<br><br>Otevři: <a href="https://en.wikipedia.org" style="color:#c8f135">wikipedia.org</a> a spusť skript v konzoli</div>';});
</script>
</body></html>
