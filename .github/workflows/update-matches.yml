name: Update Matches

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'keepalive.txt'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch matches
        run: python3 scrape_matches.py
      - name: Update live player history
        run: python3 update_history_live.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json player_history/
          git diff --staged --quiet || git commit -m "matches: $(date -u +%H:%M:%S)"
          git push
