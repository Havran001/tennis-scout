name: Update Matches

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch matches
        run: python3 scrape_matches.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add matches.json
          git diff --staged --quiet || git commit -m "matches: $(date -u +%H:%M:%S)"
          git push
