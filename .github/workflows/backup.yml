name: Daily Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create daily backup branch
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="backup/$DATE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH
          git push origin $BRANCH
          echo "Backup $BRANCH created"

      - name: Delete old backups (keep last 7)
        run: |
          git fetch --all
          OLD=$(git branch -r | grep 'origin/backup/' | sort | head -n -7)
          for b in $OLD; do
            NAME=${b#origin/}
            git push origin --delete "$NAME" && echo "Deleted: $NAME"
          done
