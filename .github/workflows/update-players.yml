name: Update ATP Players Weekly

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update-players:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install requests beautifulsoup4 lxml

      - name: Scrape ATP Rankings
        run: python3 scrape_atp.py

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atp_players.json
          git diff --staged --quiet || git commit -m 'players: weekly ATP ranking update'
          git push