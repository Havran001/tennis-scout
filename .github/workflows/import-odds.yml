name: Import Odds

on:
  push:
    paths:
      - 'pending_imports/**'
  workflow_dispatch: {}

# Aby se nebezelo vic instanci najednou (race conditions na sha pri PUT/DELETE)
concurrency:
  group: import-odds
  cancel-in-progress: false

jobs:
  import:
    # Self-hosted runner na Macu (EU IP) — vyhne se geo-IP filtringu BetExploreru
    runs-on: [self-hosted, mac]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save jsdom@24

      - name: Run import pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/import-odds.mjs
