name: Clear Player History

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clear all match history
        run: python3 clear_player_history.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add player_history/
          git diff --staged --quiet || git commit -m "clear: reset all player match history"
          git push
