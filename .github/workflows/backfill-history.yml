name: Backfill Player History (Flashscore)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install requests

      - name: Run Flashscore history backfill
        run: python3 scrape_history_flashscore.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add player_history/
          git diff --staged --quiet || git commit -m "backfill: 2025 history from Flashscore"
          git pull --rebase origin main
          git push
