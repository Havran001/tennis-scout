name: Update TA Player History
on:
  schedule:
    - cron: '0 3 * * 2'  # Every Tuesday at 3:00 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: pip install requests
      - name: Run TA history scraper
        run: python3 scrape_ta_history.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add player_history/
          git diff --staged --quiet || git commit -m "TA history: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
