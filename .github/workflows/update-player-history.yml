name: Update Player History

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install requests

      - name: Run player history scraper
        run: python3 scrape_player_history.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add player_history/
          git diff --staged --quiet || git commit -m "player-history: $(date -u +%Y-%m-%d)"
          git push
